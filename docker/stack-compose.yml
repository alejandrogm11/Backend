services:
  # ──────────────────────────────
  # SQL SERVER
  # ──────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: MiPassword123!
      MSSQL_PID: Developer
    ports:
      - 1433:1433
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager

  # ──────────────────────────────
  # LOOPBACK API
  # ──────────────────────────────
  loopback-app:
    image: lb:1.0
    ports:
      - 3000:3000
    environment:
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_USER: sa
      DB_PASSWORD: MiPassword123!
      DB_NAME: AGMPRUEBAS
    depends_on:
      - sqlserver
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager

  # ──────────────────────────────
  # NGINX
  # ──────────────────────────────

  frontend:
    image: nginx:alpine
    ports:
      - 8080:80
    volumes:
      - public_directory:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:r
    networks:
      - app-network

  # ──────────────────────────────
  # MAIL HOG
  # ──────────────────────────────

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "1025:1025" # Puerto SMTP
      - "8025:8025" # Puerto UI Web
    restart: unless-stopped


volumes:
  sqlserver_data:
    driver: local
  public_directory:
    driver: local

networks:
  app-network:
    driver: overlay

    
