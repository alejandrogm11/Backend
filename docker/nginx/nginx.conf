server {
    listen 80;
    server_name localhost;
    
    # Ruta donde están los archivos del build de Quasar
    root /usr/share/nginx/html;
    index index.html;

    # Configuración para SPA (todas las rutas devuelven index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para las peticiones API
    location /api/ {
        # Reescribir /api/auth/login -> /auth/login
        rewrite ^/api/(.*)$ /$1 break;
        
        proxy_pass http://loopback-app:3000;
        proxy_http_version 1.1;
        
        # Headers necesarios
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Cabeceras de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}